name: Update bibliography

on:
  schedule:
    # Sundays at 04:30 UTC — avoids peak OpenAlex usage.
    - cron: "30 4 * * 0"
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Ignore cached author updated_date; refetch everything"
        type: boolean
        default: false

permissions:
  contents: write   # for committing the refreshed SQLite + JSON
  pages: write      # for deploy-pages
  id-token: write   # for deploy-pages OIDC

concurrency:
  group: forrt-bibliography-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so the commit-back step is clean.
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      # Restore OpenAlex SQLite cache across runs. The cache is keyed on a
      # weekly-rotating date so we always have a working fallback — restore-keys
      # will grab the previous week's cache and the fetcher will update it
      # incrementally.
      - name: Restore OpenAlex cache
        id: cache-oa
        uses: actions/cache@v4
        with:
          path: data/works.sqlite
          key: openalex-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            openalex-${{ runner.os }}-

      - name: Refresh contributor list
        env:
          GSHEET_CREDENTIALS: ${{ secrets.GSHEET_CREDENTIALS }}
        run: python scripts/fetch_contributors.py

      - name: Rebuild cluster keywords
        run: python scripts/build_clusters.py

      - name: Fetch OpenAlex works (incremental)
        env:
          OPENALEX_MAILTO: ${{ vars.OPENALEX_MAILTO || 'info@forrt.org' }}
        run: |
          if [ "${{ inputs.force_refresh }}" = "true" ]; then
            python scripts/fetch_openalex.py --force
          else
            python scripts/fetch_openalex.py
          fi

      - name: Build site JSON
        run: python scripts/build_site.py

      - name: Commit refreshed data
        run: |
          git config user.name "forrt-bot"
          git config user.email "forrt-bot@users.noreply.github.com"
          # data/works.sqlite is gitignored — only the small JSON outputs and
          # the refreshed contributors.csv / clusters.yaml get committed.
          git add data/contributors.csv data/clusters.yaml site/data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Auto-update bibliography data ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Upload site artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Bibliography update failed (${new Date().toISOString().slice(0,10)})`;
            const body = [
              `The scheduled bibliography update failed.`,
              ``,
              `Run: ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
            ].join("\n");
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title, body, labels: ["automation", "update-failure"],
            });
